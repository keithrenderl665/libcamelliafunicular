name: Continuous Integration
on:
  workflow_dispatch:

  schedule:
    - cron: '47 0,6,12,18 * * *'
env:
  CI: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
